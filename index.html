<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>九州家庭旅遊行程總覽</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      color-scheme: light;
    }
    body {
      background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
    }
    .glass {
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(8px);
    }
    .tab-active {
      background: #1d4ed8;
      color: #fff;
      box-shadow: 0 8px 24px rgba(29, 78, 216, 0.26);
    }
    .tab-inactive {
      background: #ffffff;
      color: #334155;
      border: 1px solid #cbd5e1;
    }
  </style>
</head>
<body class="text-slate-800 antialiased">
  <header class="sticky top-0 z-50 border-b border-slate-200 bg-white/95 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-4 md:px-8">
      <div>
        <p class="text-xs font-semibold uppercase tracking-widest text-blue-700">Kyushu Family Trip</p>
        <h1 class="text-xl font-extrabold md:text-2xl">九州旅遊行程中心</h1>
        <p class="text-xs text-slate-500 md:text-sm">專業化・高可視・跨裝置自適應・高互動</p>
      </div>
      <button id="copyBtn" class="rounded-xl bg-slate-900 px-3 py-2 text-xs font-bold text-white transition hover:bg-slate-700 md:text-sm">複製今日重點</button>
    </div>
  </header>

  <main class="mx-auto grid max-w-7xl grid-cols-1 gap-4 px-4 py-5 md:grid-cols-12 md:gap-5 md:px-8">
    <aside class="md:col-span-4 lg:col-span-3">
      <section class="glass rounded-2xl border border-slate-200 p-4 shadow-sm">
        <h2 class="mb-3 text-sm font-black text-slate-600">快速導覽</h2>
        <div id="dayTabs" class="grid grid-cols-2 gap-2 sm:grid-cols-4 md:grid-cols-2"></div>

        <div class="mt-4 rounded-xl bg-blue-50 p-3 text-sm text-blue-900">
          <p class="font-bold">進度</p>
          <div class="mt-2 h-2 rounded-full bg-blue-100">
            <div id="progressBar" class="h-2 rounded-full bg-blue-600 transition-all duration-300" style="width: 12.5%"></div>
          </div>
          <p id="progressText" class="mt-2 text-xs font-semibold">Day 1 / 8</p>
        </div>
      </section>

      <section class="glass mt-4 rounded-2xl border border-slate-200 p-4 shadow-sm">
        <h3 class="text-sm font-black text-slate-600">資訊搜尋</h3>
        <input id="searchInput" type="text" placeholder="輸入關鍵字，例如：水族館、福岡、鰻魚飯" class="mt-2 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none ring-blue-300 focus:ring" />
        <div class="mt-3 grid grid-cols-3 gap-2 text-xs font-bold">
          <button class="filterBtn rounded-lg bg-slate-100 px-2 py-2" data-filter="all">全部</button>
          <button class="filterBtn rounded-lg bg-slate-100 px-2 py-2" data-filter="play">玩樂</button>
          <button class="filterBtn rounded-lg bg-slate-100 px-2 py-2" data-filter="food">美食</button>
        </div>
      </section>
    </aside>

    <section class="md:col-span-8 lg:col-span-9">
      <div id="overviewCard" class="glass rounded-2xl border border-slate-200 p-4 shadow-sm md:p-6"></div>
      <div id="timeline" class="mt-4 space-y-3"></div>
    </section>
  </main>

  <script>
    const itinerary = [
      {
        day: 1,
        date: '2026-05-29（五）',
        title: '落地取車與橫斷九州進別府',
        route: '熊本機場 → ASO MILK FACTORY → 別府',
        hotel: '龜之井飯店（別府）',
        focus: ['action', 'play'],
        items: [
          { type: 'action', time: '13:00', title: '機場取車 + KEP 確認', desc: '確認 ETC/KEP、兒童座椅、導航語言，避免現場補件延誤。' },
          { type: 'play', time: '14:00', title: 'ASO MILK FACTORY 休息', desc: '放電 + 補給 + 廁所，降低長途山路暈車風險。' },
          { type: 'action', time: '17:30', title: '抵達別府入住', desc: '若體力許可可加 Global Tower 夜景，否則直接休息。' }
        ]
      },
      {
        day: 2,
        date: '2026-05-30（六）',
        title: 'Harmonyland 一日親子樂園',
        route: '別府 ↔ Harmonyland',
        hotel: '龜之井飯店（別府）',
        focus: ['play', 'food'],
        items: [
          { type: 'play', time: '09:30', title: '樂園入場', desc: '建議事先完成門票，避免現場排隊。' },
          { type: 'food', time: '12:00', title: '野餐午餐', desc: '以超商/超市採買為主，縮短等待時間。' },
          { type: 'food', time: '18:00', title: 'Youme Town 晚餐補貨', desc: '一站式晚餐 + 補隔日零食飲水。' }
        ]
      },
      {
        day: 3,
        date: '2026-05-31（日）',
        title: '由布院 + 海之卵水族館',
        route: '別府 → 由布院 → 海之卵',
        hotel: '龜之井飯店（別府）',
        focus: ['play', 'sight'],
        items: [
          { type: 'sight', time: '09:30', title: '由布院逆向逛街', desc: '先逛較不擁擠區段，中午前撤離。' },
          { type: 'play', time: '13:30', title: '海之卵入館', desc: '建議接 14:00 海豚秀、15:00 海象秀。' },
          { type: 'action', time: '17:00', title: '返回別府', desc: '車上補眠，晚餐以簡單高效率為原則。' }
        ]
      },
      {
        day: 4,
        date: '2026-06-01（一）',
        title: '非洲野生動物園 + 北上福岡',
        route: '別府 → Safari → 福岡天神',
        hotel: '博多綠色天神酒店',
        focus: ['play', 'action'],
        items: [
          { type: 'play', time: '09:00', title: 'Safari 早場入園', desc: '提早入場較容易銜接叢林巴士。' },
          { type: 'action', time: '15:30', title: '依時間判斷是否加大濠公園', desc: '超過 15:30 直接飯店 check-in。' },
          { type: 'food', time: '19:00', title: '天神商圈晚餐', desc: '以高機動晚餐選項為主，降低排隊壓力。' }
        ]
      },
      {
        day: 5,
        date: '2026-06-02（二）',
        title: '天神購物 + Marine World',
        route: '天神 → 福岡塔碼頭 ↔ Marine World',
        hotel: '博多綠色天神酒店',
        focus: ['play', 'food'],
        items: [
          { type: 'action', time: '10:00', title: '天神市區採買', desc: '戰利品可回房先放置，保持移動輕量。' },
          { type: 'play', time: '12:30', title: '搭船前往海之中道', desc: '建議先完成輕食補給。' },
          { type: 'food', time: '18:30', title: 'Mark Is 晚餐', desc: '室內空間大，適合親子補給與休息。' }
        ]
      },
      {
        day: 6,
        date: '2026-06-03（三）',
        title: '櫛田神社・太宰府・柳川・熊本',
        route: '福岡 → 太宰府 → 柳川 → 熊本',
        hotel: 'KOKO HOTEL Premier',
        focus: ['sight', 'food'],
        items: [
          { type: 'sight', time: '08:30', title: '櫛田神社快閃', desc: '人潮較少時段快速參觀。' },
          { type: 'sight', time: '10:00', title: '太宰府天滿宮', desc: '逛表參道與人氣點心。' },
          { type: 'food', time: '13:30', title: '柳川蒸籠鰻魚飯', desc: '搭船後安排經典在地餐食。' }
        ]
      },
      {
        day: 7,
        date: '2026-06-04（四）',
        title: '阿蘇大草原情境決策日',
        route: '熊本 ↔ 阿蘇',
        hotel: 'KOKO HOTEL Premier',
        focus: ['action', 'sight'],
        items: [
          { type: 'action', time: '08:00', title: '確認天氣與火口管制', desc: '先判斷情境 A/B/C/D 再決定上山。' },
          { type: 'sight', time: '10:00', title: '草千里 / 火口 / 大觀峰彈性切換', desc: '以安全與能見度為第一優先。' },
          { type: 'food', time: '19:00', title: '熊本市區晚餐', desc: '視體力安排名店或飯店周邊用餐。' }
        ]
      },
      {
        day: 8,
        date: '2026-06-05（五）',
        title: '熊本城 + 熊本熊廣場 + 返程',
        route: '熊本市區 → 熊本機場',
        hotel: '返家',
        focus: ['sight', 'play'],
        items: [
          { type: 'sight', time: '10:00', title: '熊本城精簡參觀', desc: '控制在 2 小時內，保留返程體力。' },
          { type: 'play', time: '14:00', title: '熊本熊部長演出', desc: '提前 20-30 分鐘到場卡位。' },
          { type: 'action', time: '17:00', title: '還車與機場晚餐', desc: '先用餐再安檢，避免國際線餐飲不足。' }
        ]
      }
    ];

    const typeLabel = {
      play: '玩樂',
      food: '美食',
      sight: '景點',
      action: '行動'
    };

    const typeStyle = {
      play: 'bg-fuchsia-50 border-fuchsia-200',
      food: 'bg-amber-50 border-amber-200',
      sight: 'bg-sky-50 border-sky-200',
      action: 'bg-slate-50 border-slate-300'
    };

    let activeDay = 1;
    let activeFilter = 'all';

    const dayTabs = document.getElementById('dayTabs');
    const overviewCard = document.getElementById('overviewCard');
    const timeline = document.getElementById('timeline');
    const searchInput = document.getElementById('searchInput');

    function renderTabs() {
      dayTabs.innerHTML = '';
      itinerary.forEach((d) => {
        const btn = document.createElement('button');
        const isActive = d.day === activeDay;
        btn.className = `rounded-xl px-3 py-2 text-left text-xs font-bold transition md:text-sm ${isActive ? 'tab-active' : 'tab-inactive hover:border-blue-300 hover:text-blue-700'}`;
        btn.innerHTML = `<div>Day ${d.day}</div><div class="mt-1 text-[10px] opacity-80 md:text-xs">${d.date}</div>`;
        btn.onclick = () => {
          activeDay = d.day;
          renderAll();
        };
        dayTabs.appendChild(btn);
      });
    }

    function renderOverview(dayData) {
      overviewCard.innerHTML = `
        <div class="flex flex-wrap items-start justify-between gap-3">
          <div>
            <p class="inline-flex rounded-full bg-blue-100 px-3 py-1 text-xs font-bold text-blue-700">${dayData.date}</p>
            <h2 class="mt-2 text-xl font-black md:text-2xl">Day ${dayData.day}｜${dayData.title}</h2>
            <p class="mt-2 text-sm text-slate-600"><span class="font-bold text-slate-800">路線：</span>${dayData.route}</p>
            <p class="mt-1 text-sm text-slate-600"><span class="font-bold text-slate-800">住宿：</span>${dayData.hotel}</p>
          </div>
          <div class="rounded-xl bg-slate-900 px-3 py-2 text-xs font-bold text-white">手機 / 平板 / 電腦皆可快速閱讀</div>
        </div>
      `;
    }

    function renderTimeline(dayData) {
      const keyword = searchInput.value.trim().toLowerCase();

      const filtered = dayData.items.filter((item) => {
        const matchFilter = activeFilter === 'all' ? true : item.type === activeFilter;
        const text = `${item.title} ${item.desc} ${typeLabel[item.type] || ''}`.toLowerCase();
        const matchKeyword = keyword ? text.includes(keyword) : true;
        return matchFilter && matchKeyword;
      });

      if (!filtered.length) {
        timeline.innerHTML = `<div class="rounded-2xl border border-dashed border-slate-300 bg-white p-6 text-center text-sm text-slate-500">找不到符合條件的行程，請清空搜尋或切換分類。</div>`;
        return;
      }

      timeline.innerHTML = filtered
        .map((item) => `
          <article class="rounded-2xl border p-4 shadow-sm transition hover:-translate-y-0.5 hover:shadow ${typeStyle[item.type] || 'bg-white border-slate-200'}">
            <div class="flex items-start justify-between gap-3">
              <div>
                <p class="text-xs font-black uppercase tracking-wider text-slate-500">${item.time} · ${typeLabel[item.type] || '行程'}</p>
                <h3 class="mt-1 text-base font-black md:text-lg">${item.title}</h3>
              </div>
              <button class="rounded-lg border border-slate-300 bg-white px-2 py-1 text-xs font-bold text-slate-600" onclick="navigator.clipboard.writeText('${item.time} ${item.title}｜${item.desc}'.replaceAll("'", '’'))">複製</button>
            </div>
            <p class="mt-2 text-sm leading-6 text-slate-700">${item.desc}</p>
          </article>
        `)
        .join('');
    }

    function updateProgress() {
      const progress = (activeDay / itinerary.length) * 100;
      document.getElementById('progressBar').style.width = `${progress}%`;
      document.getElementById('progressText').textContent = `Day ${activeDay} / ${itinerary.length}`;
    }

    function renderAll() {
      const dayData = itinerary.find((d) => d.day === activeDay);
      renderTabs();
      renderOverview(dayData);
      renderTimeline(dayData);
      updateProgress();
    }

    document.querySelectorAll('.filterBtn').forEach((btn) => {
      btn.addEventListener('click', () => {
        activeFilter = btn.dataset.filter;
        document.querySelectorAll('.filterBtn').forEach((x) => x.classList.remove('bg-blue-600', 'text-white'));
        btn.classList.add('bg-blue-600', 'text-white');
        renderAll();
      });
    });

    searchInput.addEventListener('input', renderAll);

    document.getElementById('copyBtn').addEventListener('click', async () => {
      const d = itinerary.find((x) => x.day === activeDay);
      const msg = [`Day ${d.day} ${d.title}`, `日期：${d.date}`, `路線：${d.route}`, ...d.items.map((i) => `${i.time} ${i.title}`)].join('\n');
      await navigator.clipboard.writeText(msg);
      alert('已複製今日重點，可直接貼到群組。');
    });

    document.querySelector('[data-filter="all"]').classList.add('bg-blue-600', 'text-white');
    renderAll();
  </script>
</body>
</html>
